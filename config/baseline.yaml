# Baseline single-agent sweep config
# 1:1 with scripts/run_baseline.py
# Edit llm.base_url and llm.model to match your endpoint.

run:
  n_runs: 20
  run_id_prefix: "baseline"

llm:
  model: "meta-llama/llama-3.1-8b-instruct:free"
  base_url: "${OPENAI_BASE_URL}"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.0
  max_tokens: 2048
  request_timeout: 60

mcp:
  workspace_root: "workspace/"

artifacts:
  output_dir: "artifacts/"
