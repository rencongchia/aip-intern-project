# Phase 3 fault injection sweep config
# 1:1 with scripts/run_phase3.py
# 4 fault types × 5 runs = 20 total injection runs
# Run-id prefix per fault type: failures_timeout, failures_malformed, failures_checkpoint, failures_overflow

run:
  n_runs: 5
  run_id_prefix: "failures"

fault_types:
  - name: "timeout"
    after_seconds: 3.0
  - name: "malformed_json"
    fail_on_call: 1
  - name: "checkpoint_loss"
  - name: "context_overflow"
    token_limit: 500

llm:
  model: "openai/meta-llama/llama-3.2-3b-instruct:free"
  base_url: "${OPENAI_BASE_URL}"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.0
  max_tokens: 1024
  request_timeout: 60

mcp:
  workspace_root: "workspace/"

artifacts:
  output_dir: "artifacts/"
