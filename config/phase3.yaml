# Phase 3 fault injection sweep config
# 1:1 with scripts/run_phase3.py
# 4 fault types × 5 runs = 20 total injection runs
# Run-id prefix per fault type: failures_timeout, failures_malformed, failures_checkpoint, failures_overflow

run:
  n_runs: 5
  run_id_prefix: "failures"
  inter_run_delay_s: 1  # short delay between runs (local model, no rate limits)

fault_types:
  - name: "timeout"
    after_seconds: 3.0
  - name: "malformed_json"
    fail_on_call: 1
  - name: "checkpoint_loss"
  - name: "context_overflow"
    token_limit: 200  # workspace input is ~410 tokens; limit at 200 ensures reliable overflow

llm:
  model: "openai/openai/gpt-4o-mini"
  base_url: "${OPENAI_BASE_URL}"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.0
  max_tokens: 1024
  request_timeout: 120

mcp:
  workspace_root: "workspace/"

artifacts:
  output_dir: "artifacts/"
